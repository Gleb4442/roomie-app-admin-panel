server {
    listen 80;
    server_name app.hotelmol.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.hotelmol.com;

    ssl_certificate /etc/letsencrypt/live/app.hotelmol.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.hotelmol.com/privkey.pem;

    # Universal Links / App Links
    location /.well-known/ {
        alias /var/www/well-known/;
    }

    # Deep link redirect
    location /go {
        root /var/www;
        try_files /go/index.html =404;
    }
}
