<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Opening Roomie...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: -apple-system, sans-serif; text-align: center;
           padding: 60px 20px; background: #f8f9fa; }
    .logo { font-size: 48px; margin-bottom: 20px; }
    h1 { font-size: 20px; color: #333; }
    p { color: #666; margin: 16px 0; }
    .btn { display: inline-block; padding: 14px 28px; background: #007AFF;
           color: white; text-decoration: none; border-radius: 12px;
           font-size: 16px; margin: 8px; }
    .btn-secondary { background: #34C759; }
  </style>
</head>
<body>
  <div class="logo">🏨</div>
  <h1>Opening Roomie app...</h1>
  <p id="status">Redirecting to the app...</p>
  <div id="fallback" style="display:none;">
    <p>App not installed? Download it:</p>
    <a class="btn" href="https://apps.apple.com/app/roomie/idXXXXXX">App Store</a>
    <a class="btn btn-secondary" href="https://play.google.com/store/apps/details?id=com.hotelmol.roomie">Google Play</a>
  </div>
  <script>
    var params = window.location.search;
    window.location.href = 'roomie://open' + params;
    setTimeout(function() {
      document.getElementById('status').textContent = 'App not found on this device.';
      document.getElementById('fallback').style.display = 'block';
    }, 2000);
  </script>
</body>
</html>
